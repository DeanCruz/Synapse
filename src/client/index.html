<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Synapse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- 1. Header Bar -->
  <header class="header-bar">
    <div class="header-left">
      <h1 class="header-title">Synapse</h1>
    </div>
    <div class="header-center">
      <button id="task-badge" class="task-badge" hidden aria-label="Task details"></button>
      <span id="task-directory" class="task-directory" hidden></span>
    </div>
    <div class="header-right">
      <div class="header-btn-group">
        <button id="export-btn" class="header-action-btn" title="Export swarm data" aria-label="Export swarm data">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 11v2a1 1 0 001 1h8a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span>Export</span>
        </button>
        <div class="archive-dropdown-wrap" id="archive-dropdown-wrap">
          <button id="archive-btn" class="header-action-btn" title="Archive" aria-label="Archive actions">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="2" width="14" height="3" rx="1" stroke="currentColor" stroke-width="1.2"/>
              <path d="M2.5 5v7.5a1 1 0 001 1h9a1 1 0 001-1V5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M6 8.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span>Archive</span>
          </button>
          <div class="archive-dropdown" id="archive-dropdown" hidden>
            <button class="archive-dropdown-item" id="archive-task-btn">Archive task</button>
            <button class="archive-dropdown-item" id="view-archive-btn">View Archive</button>
          </div>
        </div>
        <button id="history-btn" class="header-action-btn" title="History" aria-label="View task history">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/>
            <path d="M8 4.5V8l2.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span>History</span>
        </button>
      </div>
      <span id="active-count" class="active-badge">0 active</span>
    </div>
  </header>

  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar" id="dashboard-sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Dashboards</span>
        <button id="sidebar-toggle-btn" class="sidebar-toggle-btn" title="Collapse sidebar" aria-label="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div id="dashboard-list" class="dashboard-list"></div>
      <div class="sidebar-footer">
        <button id="settings-btn" class="sidebar-settings-btn" title="Settings" aria-label="Settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6.7 1.4a1 1 0 011.6 0l.5.7a1 1 0 001 .4l.8-.2a1 1 0 011.1.8l.1.9a1 1 0 00.7.7l.9.1a1 1 0 01.8 1.1l-.2.8a1 1 0 00.4 1l.7.5a1 1 0 010 1.6l-.7.5a1 1 0 00-.4 1l.2.8a1 1 0 01-.8 1.1l-.9.1a1 1 0 00-.7.7l-.1.9a1 1 0 01-1.1.8l-.8-.2a1 1 0 00-1 .4l-.5.7a1 1 0 01-1.6 0l-.5-.7a1 1 0 00-1-.4l-.8.2a1 1 0 01-1.1-.8l-.1-.9a1 1 0 00-.7-.7l-.9-.1a1 1 0 01-.8-1.1l.2-.8a1 1 0 00-.4-1l-.7-.5a1 1 0 010-1.6l.7-.5a1 1 0 00.4-1l-.2-.8a1 1 0 01.8-1.1l.9-.1a1 1 0 00.7-.7l.1-.9a1 1 0 011.1-.8l.8.2a1 1 0 001-.4l.5-.7z" stroke="currentColor" stroke-width="1.1"/>
            <circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.1"/>
          </svg>
          <span class="sidebar-settings-label">Settings</span>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <div class="dashboard-content">

  <!-- Home Overview (meta-dashboard) -->
  <section id="home-view" class="home-view" hidden></section>

  <main>

    <!-- 2. Progress Section -->
    <section class="progress-section">
      <div class="progress-track">
        <div id="progress-bar" class="progress-fill" style="width: 0%;"></div>
      </div>
      <div id="stats-bar" class="stats-bar">
        <div class="stat-card">
          <span class="stat-number" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-completed">0</span>
          <span class="stat-label">Completed</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-in-progress">0</span>
          <span class="stat-label">In Progress</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-failed">0</span>
          <span class="stat-label">Failed</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-pending">0</span>
          <span class="stat-label">Pending</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-elapsed">0:00</span>
          <span class="stat-label">Elapsed</span>
        </div>
      </div>
    </section>

    <!-- 3. Wave Pipeline -->
    <section class="wave-section">
      <div id="wave-pipeline" class="wave-pipeline"></div>
    </section>

    <!-- 3b. Clear Dashboard -->
    <section id="clear-dashboard-section" class="clear-dashboard-section" hidden>
      <button id="clear-dashboard-btn" class="clear-dashboard-btn" aria-label="Clear current dashboard">Clear Dashboard</button>
    </section>

    <!-- 4. Empty State -->
    <section id="empty-state" class="empty-state">
      <div class="empty-state-content">
        <p class="empty-state-title">No active agents</p>
        <p class="empty-state-subtitle">Waiting for !p to dispatch agents...</p>
      </div>
    </section>

  </main>

  <!-- 5. Timeline Panel -->
  <aside class="timeline-panel" id="timeline-panel">
    <div class="timeline-panel-header">
      <span class="timeline-panel-title">Timeline</span>
      <button id="timeline-close-btn" class="timeline-close" aria-label="Close timeline">&#x2715;</button>
    </div>
    <div class="timeline-panel-body" id="timeline-panel-body"></div>
  </aside>

  <!-- 6. Log Panel -->
  <aside class="log-panel" id="log-panel">
    <button id="log-toggle" class="log-toggle" aria-label="Toggle log panel">
      <span class="log-toggle-label">
        <span class="log-chevron"></span>
        <span id="log-toggle-text">Logs (0 entries)</span>
        <span id="log-last-updated" class="log-last-updated"></span>
        <span id="log-complete-badge" class="log-complete-badge" hidden>Complete</span>
      </span>
    </button>
    <div id="log-body" class="log-body">
      <div class="log-filters">
        <button class="log-filter-btn active" data-level="all">All</button>
        <button class="log-filter-btn" data-level="info">Info</button>
        <button class="log-filter-btn" data-level="warn">Warn</button>
        <button class="log-filter-btn" data-level="error">Error</button>
        <button class="log-filter-btn" data-level="deviation">Deviation</button>
      </div>
      <div id="log-entries" class="log-entries"></div>
    </div>
  </aside>

    </div><!-- /.dashboard-content -->
  </div><!-- /.dashboard-layout -->

  <!-- 7. Queue Popup — floating bottom-right indicator -->
  <div id="queue-popup-container" class="queue-popup-container" hidden></div>

  <noscript>
    <div style="text-align:center;padding:60px 24px;color:#A1A1A6;font-family:sans-serif;">
      <h2 style="color:#F5F5F7;">JavaScript Required</h2>
      <p>Synapse requires JavaScript to display real-time dashboard updates.</p>
    </div>
  </noscript>
  <script type="module" src="/src/client/app.js"></script>
</body>
</html>
