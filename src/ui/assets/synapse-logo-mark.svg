    <line x1="16" y1="16" x2="64" y2="16" stroke-width="2.8" stroke-opacity="0.5"/>
    <line x1="112" y1="16" x2="98" y2="34" stroke-width="3" stroke-opacity="0.55"/>
    <line x1="112" y1="16" x2="64" y2="16" stroke-width="2.8" stroke-opacity="0.5"/>
    <line x1="50" y1="40" x2="64" y2="16" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="50" y1="40" x2="30" y2="34" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="50" y1="40" x2="28" y2="54" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="50" y1="40" x2="78" y2="40" stroke-width="3.2" stroke-opacity="0.53"/>
    <line x1="78" y1="40" x2="64" y2="16" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="78" y1="40" x2="98" y2="34" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="78" y1="40" x2="100" y2="54" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="14" y1="64" x2="28" y2="54" stroke-width="3" stroke-opacity="0.55"/>
    <line x1="14" y1="64" x2="28" y2="74" stroke-width="3" stroke-opacity="0.55"/>
    <line x1="114" y1="64" x2="100" y2="54" stroke-width="3" stroke-opacity="0.55"/>
    <line x1="114" y1="64" x2="100" y2="74" stroke-width="3" stroke-opacity="0.55"/>
    <line x1="64" y1="64" x2="50" y2="40" stroke-width="3" stroke-opacity="0.53"/>
    <line x1="64" y1="64" x2="78" y2="40" stroke-width="3" stroke-opacity="0.53"/>
    <line x1="64" y1="64" x2="28" y2="54" stroke-width="3" stroke-opacity="0.53"/>
    <line x1="64" y1="64" x2="100" y2="54" stroke-width="3" stroke-opacity="0.53"/>
    <line x1="64" y1="64" x2="28" y2="74" stroke-width="3" stroke-opacity="0.53"/>
    <line x1="64" y1="64" x2="100" y2="74" stroke-width="3" stroke-opacity="0.53"/>
    <line x1="64" y1="64" x2="50" y2="88" stroke-width="3" stroke-opacity="0.53"/>
    <line x1="64" y1="64" x2="78" y2="88" stroke-width="3" stroke-opacity="0.53"/>
    <line x1="50" y1="88" x2="64" y2="112" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="50" y1="88" x2="30" y2="94" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="50" y1="88" x2="28" y2="74" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="50" y1="88" x2="78" y2="88" stroke-width="3.2" stroke-opacity="0.53"/>
    <line x1="78" y1="88" x2="64" y2="112" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="78" y1="88" x2="98" y2="94" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="78" y1="88" x2="100" y2="74" stroke-width="3.2" stroke-opacity="0.55"/>
    <line x1="16" y1="112" x2="30" y2="94" stroke-width="3" stroke-opacity="0.55"/>
    <line x1="16" y1="112" x2="64" y2="112" stroke-width="2.8" stroke-opacity="0.5"/>
    <line x1="112" y1="112" x2="98" y2="94" stroke-width="3" stroke-opacity="0.55"/>
    <line x1="112" y1="112" x2="64" y2="112" stroke-width="2.8" stroke-opacity="0.5"/>
