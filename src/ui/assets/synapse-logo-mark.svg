  <line class="se" x1="98" y1="34" x2="100" y2="54" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7" filter="url(#edgeGreenGlow)"/>
  <line class="se" x1="28" y1="54" x2="28" y2="74" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7" filter="url(#edgeGreenGlow)"/>
