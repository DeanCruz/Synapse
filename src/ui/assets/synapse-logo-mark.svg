  <line class="se" x1="64" y1="64" x2="100" y2="74" stroke="#22c55e" stroke-width="4.5" stroke-linecap="round" stroke-opacity="0.7" filter="url(#edgeGreenGlow)"/>
  <line class="se" x1="28" y1="74" x2="30" y2="94" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7" filter="url(#edgeGreenGlow)"/>
