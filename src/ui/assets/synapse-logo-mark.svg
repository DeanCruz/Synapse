<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Synapse logo mark">
  <defs>
    <filter id="greyGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greyEdgeGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="edgeGreenGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .sn,.se{animation:pulseGreen 2.6s ease-in-out infinite}
      .pn{animation:shimmer 3.2s ease-in-out infinite}
      .pe{animation:pulsePurpleEdge 4s ease-in-out infinite}
      @keyframes pulseGreen{0%,100%{opacity:1}50%{opacity:0.45}}
      @keyframes shimmer{0%,100%{opacity:0.3}50%{opacity:1}}
      @keyframes pulsePurpleEdge{0%,100%{opacity:0.7}50%{opacity:1}}
    </style>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="24" fill="#ffffff" fill-opacity="0.02"/>

  <!-- Purple edges (background network) -->
