    <circle cx="30" cy="94" r="3.2" fill="#22c55e"/>
    <circle cx="30" cy="94" r="1.6" fill="#86efac"/>
  </g>
  <g class="sn" filter="url(#greenGlow)">
    <circle cx="98" cy="94" r="5" fill="#22c55e" fill-opacity="0.2"/>
    <circle cx="98" cy="94" r="3.2" fill="#22c55e"/>
    <circle cx="98" cy="94" r="1.6" fill="#86efac"/>
