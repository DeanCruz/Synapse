    <circle cx="64" cy="16" r="4" fill="#22c55e"/>
    <circle cx="64" cy="16" r="2" fill="#86efac"/>
  </g>
  <g class="sn" filter="url(#greenGlow)">
    <circle cx="30" cy="34" r="5" fill="#22c55e" fill-opacity="0.2"/>
    <circle cx="30" cy="34" r="3.2" fill="#22c55e"/>
    <circle cx="30" cy="34" r="1.6" fill="#86efac"/>
  </g>
