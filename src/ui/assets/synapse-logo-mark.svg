    <circle cx="64" cy="64" r="10" fill="#22c55e" fill-opacity="0.25"/>
    <circle cx="64" cy="64" r="6.5" fill="#22c55e"/>
    <circle cx="64" cy="64" r="3.5" fill="#86efac"/>
  </g>

