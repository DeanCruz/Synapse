    <circle cx="98" cy="34" r="3.2" fill="#22c55e"/>
    <circle cx="98" cy="34" r="1.6" fill="#86efac"/>
  </g>
  <g class="sn" filter="url(#greenGlow)">
    <circle cx="28" cy="54" r="5" fill="#22c55e" fill-opacity="0.2"/>
    <circle cx="28" cy="54" r="3.2" fill="#22c55e"/>
    <circle cx="28" cy="54" r="1.6" fill="#86efac"/>
  </g>
  <g class="sn" filter="url(#greenGlow)">
    <circle cx="100" cy="54" r="5" fill="#22c55e" fill-opacity="0.2"/>
    <circle cx="100" cy="54" r="3.2" fill="#22c55e"/>
    <circle cx="100" cy="54" r="1.6" fill="#86efac"/>
  </g>
  <g class="sn" filter="url(#greenGlow)">
    <circle cx="28" cy="74" r="5" fill="#22c55e" fill-opacity="0.2"/>
    <circle cx="28" cy="74" r="3.2" fill="#22c55e"/>
    <circle cx="28" cy="74" r="1.6" fill="#86efac"/>
  </g>
  <g class="sn" filter="url(#greenGlow)">
    <circle cx="100" cy="74" r="5" fill="#22c55e" fill-opacity="0.2"/>
    <circle cx="100" cy="74" r="3.2" fill="#22c55e"/>
    <circle cx="100" cy="74" r="1.6" fill="#86efac"/>
  </g>
