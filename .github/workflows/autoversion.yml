name: Auto Version and Tag

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  version-and-tag:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          MESSAGE="${{ github.event.head_commit.message }}"
          LEVEL="patch"

          if echo "$MESSAGE" | grep -Eiq '(^|[[:space:]])(#major|\[major\]|semver:major)($|[[:space:]])'; then
            LEVEL="major"
          elif echo "$MESSAGE" | grep -Eiq '(^|[[:space:]])(#minor|\[minor\]|semver:minor)($|[[:space:]])'; then
            LEVEL="minor"
          fi

          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: version
        run: |
          npm version "${{ steps.bump.outputs.level }}" --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version files
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"

      - name: Create tag
        run: git tag "${{ steps.version.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:master
          git push origin "${{ steps.version.outputs.tag }}"
