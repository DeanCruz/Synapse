<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Synapse logo">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#123a52"/>
      <stop offset="58%" stop-color="#0a1d2d"/>
      <stop offset="100%" stop-color="#06111b"/>
    </radialGradient>
    <filter id="greyGlow1024">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenGlow1024">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="edgeGreenGlow1024">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .sn1{animation:sIn1 .4s ease-out forwards;opacity:0}
      .se1{animation:sIn1 .3s ease-out forwards;opacity:0}
      @keyframes sIn1{to{opacity:1}}
    </style>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="#06111b"/>
  <rect x="56" y="56" width="912" height="912" rx="206" fill="url(#bgGlow)"/>

