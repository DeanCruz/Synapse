  <circle cx="712" cy="592" r="22" fill="#555"/>
  <circle cx="712" cy="592" r="11" fill="#6a6a70"/>

  <circle cx="344" cy="624" r="34" fill="#3a3f4a" fill-opacity="0.45" filter="url(#greyGlow1024)"/>
  <circle cx="344" cy="624" r="22" fill="#555"/>
  <circle cx="344" cy="624" r="11" fill="#6a6a70"/>

  <circle cx="128" cy="880" r="28" fill="#3a3f4a" fill-opacity="0.4" filter="url(#greyGlow1024)"/>
  <circle cx="128" cy="880" r="18" fill="#4a4a55"/>
  <circle cx="128" cy="880" r="8" fill="#666"/>

