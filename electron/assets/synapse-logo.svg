    <line x1="512" y1="96" x2="496" y2="176" stroke-width="10" stroke-opacity="0.2"/>
    <line x1="512" y1="96" x2="312" y2="192" stroke-width="10" stroke-opacity="0.16"/>
    <line x1="512" y1="96" x2="712" y2="224" stroke-width="10" stroke-opacity="0.16"/>
