  <line class="se1" style="animation-delay:.05s" x1="496" y1="176" x2="712" y2="224" stroke="#22c55e" stroke-width="14" stroke-linecap="round" stroke-opacity="0.55" filter="url(#edgeGreenGlow1024)"/>
